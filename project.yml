name: StackConnect

options:
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.3"
  developmentRegion: en
  createIntermediateGroups: true
  groupSortPosition: none
  knownRegions:
    - en
    - de
    - es
    - es-MX
    - fr
    - it
    - ja
    - ko
    - nl
    - pt-BR
    - pt-PT
    - ru
    - sv
    - zh-Hant

settings:
  base:
    ALWAYS_SEARCH_USER_PATHS: NO
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    CLANG_ANALYZER_NONNULL: YES
    CLANG_ANALYZER_NUMBER_OBJECT_CONVERSION: YES_AGGRESSIVE
    CLANG_CXX_LANGUAGE_STANDARD: gnu++20
    CLANG_ENABLE_MODULES: YES
    CLANG_ENABLE_OBJC_ARC: YES
    CLANG_ENABLE_OBJC_WEAK: YES
    CLANG_WARN_BLOCK_CAPTURE_AUTORELEASING: YES
    CLANG_WARN_BOOL_CONVERSION: YES
    CLANG_WARN_COMMA: YES
    CLANG_WARN_CONSTANT_CONVERSION: YES
    CLANG_WARN_DEPRECATED_OBJC_IMPLEMENTATIONS: YES
    CLANG_WARN_DIRECT_OBJC_ISA_USAGE: YES_ERROR
    CLANG_WARN_DOCUMENTATION_COMMENTS: YES
    CLANG_WARN_EMPTY_BODY: YES
    CLANG_WARN_ENUM_CONVERSION: YES
    CLANG_WARN_INFINITE_RECURSION: YES
    CLANG_WARN_INT_CONVERSION: YES
    CLANG_WARN_NON_LITERAL_NULL_CONVERSION: YES
    CLANG_WARN_OBJC_IMPLICIT_RETAIN_SELF: YES
    CLANG_WARN_OBJC_LITERAL_CONVERSION: YES
    CLANG_WARN_OBJC_ROOT_CLASS: YES_ERROR
    CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: YES
    CLANG_WARN_RANGE_LOOP_ANALYSIS: YES
    CLANG_WARN_STRICT_PROTOTYPES: YES
    CLANG_WARN_SUSPICIOUS_MOVE: YES
    CLANG_WARN_UNGUARDED_AVAILABILITY: YES_AGGRESSIVE
    CLANG_WARN_UNREACHABLE_CODE: YES
    CLANG_WARN__DUPLICATE_METHOD_MATCH: YES
    COPY_PHASE_STRIP: NO
    ENABLE_STRICT_OBJC_MSGSEND: YES
    GCC_C_LANGUAGE_STANDARD: gnu17
    GCC_NO_COMMON_BLOCKS: YES
    GCC_WARN_64_TO_32_BIT_CONVERSION: YES
    GCC_WARN_ABOUT_RETURN_TYPE: YES_ERROR
    GCC_WARN_UNDECLARED_SELECTOR: YES
    GCC_WARN_UNINITIALIZED_AUTOS: YES_AGGRESSIVE
    GCC_WARN_UNUSED_FUNCTION: YES
    GCC_WARN_UNUSED_VARIABLE: YES
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES
    MTL_FAST_MATH: YES
    SDKROOT: iphoneos
    SWIFT_EMIT_LOC_STRINGS: YES
    SWIFT_STRICT_CONCURRENCY: complete
  debug:
    DEBUG_INFORMATION_FORMAT: dwarf
    ENABLE_TESTABILITY: YES
    GCC_DYNAMIC_NO_PIC: NO
    GCC_OPTIMIZATION_LEVEL: "0"
    GCC_PREPROCESSOR_DEFINITIONS:
      - "DEBUG=1"
      - "$(inherited)"
    MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
    ONLY_ACTIVE_ARCH: YES
    SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG $(inherited)"
    SWIFT_OPTIMIZATION_LEVEL: "-Onone"
  release:
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    ENABLE_NS_ASSERTIONS: NO
    SWIFT_COMPILATION_MODE: wholemodule
    VALIDATE_PRODUCT: YES

packages:
  appstoreconnect-swift-sdk:
    url: https://github.com/r1b2ns/appstoreconnect-swift-sdk.git
    branch: master
  netfox:
    url: https://github.com/rubensmachion/netfox
    branch: develop
  StackProtocols:
    path: Packages/StackProtocols
  APIProviderFirebase:
    path: Packages/APIProviderFirebase
  APIProviderPlay:
    path: Packages/APIProviderPlay

targets:
  StackConnect:
    type: application
    platform: iOS
    deploymentTarget: "17.0"

    sources:
      - path: StackConnect
        excludes:
          - "**/*.storekit"

    info:
      path: StackConnect/Info.plist
      properties:
        CFBundleDevelopmentRegion: "$(DEVELOPMENT_LANGUAGE)"
        CFBundleExecutable: "$(EXECUTABLE_NAME)"
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        CFBundleName: "$(APP_DISPLAY_NAME)"
        CFBundleDisplayName: "$(APP_DISPLAY_NAME)"
        CFBundlePackageType: "$(PRODUCT_BUNDLE_PACKAGE_TYPE)"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "1"
        ITSAppUsesNonExemptEncryption: false
        LSRequiresIPhoneOS: true
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
          UISceneConfigurations: {}
        UILaunchStoryboardName: LaunchScreen
        UIRequiredDeviceCapabilities:
          - armv7
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

    configFiles:
      Debug: Configs/Debug.xcconfig
      Release: Configs/Release.xcconfig

    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_NAME: "$(TARGET_NAME)"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"

    dependencies:
      - package: netfox
        product: netfox
      - package: appstoreconnect-swift-sdk
        product: AppStoreConnect-Swift-SDK
      - package: StackProtocols
      - package: APIProviderFirebase
      - package: APIProviderPlay

  StackConnectTests:
    type: bundle.unit-test
    platform: iOS

    sources:
      - path: StackConnectTests

    info:
      path: StackConnectTests/Info.plist
      properties:
        CFBundleDevelopmentRegion: "$(DEVELOPMENT_LANGUAGE)"
        CFBundleExecutable: "$(EXECUTABLE_NAME)"
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER_TESTS)"
        CFBundleName: "$(PRODUCT_NAME)"
        CFBundlePackageType: "$(PRODUCT_BUNDLE_PACKAGE_TYPE)"
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"

    settings:
      base:
        BUNDLE_LOADER: "$(TEST_HOST)"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: "$(PRODUCT_BUNDLE_IDENTIFIER_TESTS)"
        PRODUCT_NAME: "$(TARGET_NAME)"
        SWIFT_VERSION: "5.0"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/StackConnect.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/StackConnect"

    dependencies:
      - target: StackConnect

schemes:
  StackConnect Development:
    build:
      targets:
        StackConnect: all
        StackConnectTests: [build, test]
    run:
      config: Debug
      executable: StackConnect
      storeKitConfiguration: StackConnect/Infra/Subscription/StackConnectProductsDev.storekit
    test:
      config: Debug
      targets: [StackConnectTests]

  StackConnect Production:
    build:
      targets:
        StackConnect: all
    run:
      config: Release
      executable: StackConnect
      storeKitConfiguration: StackConnect/Infra/Subscription/StackConnectProductsPrd.storekit

  StackConnectTests:
    build:
      targets:
        StackConnect: [build, test]
        StackConnectTests: [build, test]
    test:
      config: Debug
      targets: [StackConnectTests]
