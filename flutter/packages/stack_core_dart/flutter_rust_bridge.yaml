# flutter_rust_bridge v2 codegen config for the stack_core Dart binding.
#
# This is the SECOND binding for the `stack_core` crate (the first is the
# UniFFI/Swift one). All FRB Rust code lives behind the crate's `frb` feature
# (default OFF), so codegen must enable it to see the cfg-gated `frb_api` module.
#
# Local dev: `rust_root` is a relative path to the core crate (no git submodule
# yet). Regenerate with:
#   flutter_rust_bridge_codegen generate
# (run from this package dir; reads this file by default).

# Module-path inputs (v2 style), pointing at the core's FRB facade.
rust_input: crate::frb_api
# Path to the core crate root (contains its Cargo.toml). Local dev: no git
# submodule yet. Absolute to keep FRB's path math unambiguous.
rust_root: /Users/rubensmachion/repos/Open/stack-connect-core/crates/stack_core
# Enable the cfg-gated FRB module so codegen can parse `frb_api`.
rust_features:
  - frb
# Generated Dart bindings land here, inside the package's lib/.
dart_output: lib/src/rust
# Generated Rust glue is written into the core crate as `frb_generated.rs`.
# Use an absolute, already-normalized path: FRB's module-path computation needs
# this to sit cleanly under `<rust_root>/src`, and `..`-laden relative paths
# break that prefix match.
rust_output: /Users/rubensmachion/repos/Open/stack-connect-core/crates/stack_core/src/frb_generated.rs
# `lib.rs` already declares `mod frb_generated;` (behind #[cfg(feature = "frb")]),
# so don't let codegen insert an unguarded `mod frb_generated;`.
add_mod_to_lib: false
